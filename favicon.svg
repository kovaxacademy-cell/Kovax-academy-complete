<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1E6E"/>
      <stop offset="100%" stop-color="#1A3FAA"/>
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#29ABE2"/>
      <stop offset="100%" stop-color="#7B2D8B"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#29ABE2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7B2D8B" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Animated border ring -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="url(#kGrad)" stroke-width="1.5" stroke-dasharray="56,200" stroke-linecap="round" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Inner glow pulse -->
  <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#glowGrad)">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Letter K - vertical bar -->
  <rect x="20" y="14" width="5" height="36" rx="2.5" fill="url(#kGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Letter K - upper arm -->
  <polygon points="25,32 43,14 38,14 22,29" fill="url(#kGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" begin="0.15s" repeatCount="indefinite"/>
  </polygon>

  <!-- Letter K - lower arm -->
  <polygon points="25,32 43,50 38,50 22,35" fill="url(#kGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Cyan dot accent top-right -->
  <circle cx="50" cy="13" r="3.5" fill="#29ABE2" opacity="0.9">
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Purple dot accent bottom-left -->
  <circle cx="13" cy="51" r="2.5" fill="#7B2D8B" opacity="0.8">
    <animate attributeName="r" values="2;3.5;2" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
