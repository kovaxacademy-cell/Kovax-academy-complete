<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enskripsyon Resevwa — Kovax Academy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;padding:30px;font-family:Outfit,sans-serif;background:radial-gradient(circle at 20% 20%,rgba(41,171,226,.22),transparent 35%),radial-gradient(circle at 80% 80%,rgba(123,45,139,.25),transparent 35%),#06091A;color:#fff}
.card{width:min(560px,100%);text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:42px 32px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(41,171,226,.15)}
.badge{display:inline-flex;padding:7px 16px;border:1px solid rgba(41,171,226,.3);background:rgba(41,171,226,.09);color:#29ABE2;border-radius:999px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(34px,6vw,52px);line-height:1.02;margin-bottom:14px}
p{color:rgba(255,255,255,.68);font-size:17px;line-height:1.7;margin-bottom:24px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-block;padding:15px 24px;border-radius:14px;text-decoration:none;color:white;font-weight:800}
.primary{background:linear-gradient(135deg,#1A3FAA,#29ABE2);box-shadow:0 0 30px rgba(41,171,226,.28)}
.secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
.small{font-size:13px;color:rgba(255,255,255,.48);margin-top:22px;margin-bottom:0}

</style>

<meta name="theme-color" content="#06091A">
<link rel="manifest" href="manifest.json">
<script defer src="analytics.js"></script>

<style id="kovax-loading-style">
#kovaxLoader{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#06091A;transition:opacity .45s ease,visibility .45s ease}
#kovaxLoader.hide{opacity:0;visibility:hidden}
.kovax-loader-box{text-align:center;color:white;font-family:Outfit,Arial,sans-serif}
.kovax-spinner{width:58px;height:58px;border-radius:50%;border:4px solid rgba(255,255,255,.12);border-top-color:#29ABE2;margin:0 auto 16px;animation:kovaxSpin .8s linear infinite}
.kovax-loader-box strong{letter-spacing:.08em}.kovax-loader-box span{display:block;margin-top:6px;color:rgba(255,255,255,.58);font-size:13px}
@keyframes kovaxSpin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="kovaxLoader"><div class="kovax-loader-box"><div class="kovax-spinner"></div><strong>KOVAX ACADEMY</strong><span>Chargement...</span></div></div>
<script>window.addEventListener('load',()=>setTimeout(()=>document.getElementById('kovaxLoader')?.classList.add('hide'),350));</script>

<div class="card">
  <div class="badge">Enskripsyon resevwa</div>
  <h1>✅ Mèsi!</h1>
  <p>Nou resevwa enskripsyon ou avèk siksè. Yon konseye Kovax Academy ap kontakte ou byento pou konfime kou ou chwazi a ak pwochen etap paiement lan.</p>
  <div class="actions">
    <a id="payLink" class="primary" href="paiement.html">Kontinye pou Peye →</a>
    <a class="secondary" href="index.html">Retounen Akèy</a>
  </div>
  <p class="small">Kovax Academy — Depase Tout Limit ak Teknoloji.</p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const kou = params.get("kou") || "informatique";
const peyi = params.get("peyi") || "";
document.getElementById("payLink").href = "paiement.html?kou=" + encodeURIComponent(kou) + "&peyi=" + encodeURIComponent(peyi);
</script>


</body>
</html>
