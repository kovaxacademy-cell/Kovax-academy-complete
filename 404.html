<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Paj Pa Jwenn | Kovax Academy</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="robots" content="noindex, nofollow">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#06091A;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);}
.orb1{width:600px;height:600px;background:rgba(14,30,110,0.6);top:-200px;left:-200px;}
.orb2{width:400px;height:400px;background:rgba(41,171,226,0.18);bottom:0;right:-100px;}
.orb3{width:350px;height:350px;background:rgba(123,45,139,0.2);bottom:100px;left:20%;}
.content{position:relative;z-index:1;max-width:520px;}
.num{font-size:clamp(100px,20vw,160px);font-weight:900;line-height:1;letter-spacing:-0.05em;background:linear-gradient(135deg,#29ABE2,#7B2D8B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glitch 4s infinite;}
@keyframes glitch{0%,88%,100%{transform:none;}91%{transform:translate(-3px,0);}94%{transform:translate(3px,0);}97%{transform:translate(-1px,0);}}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(41,171,226,0.08);border:1px solid rgba(41,171,226,0.25);border-radius:100px;padding:6px 16px;margin-bottom:20px;font-size:11px;letter-spacing:.12em;color:#29ABE2;font-family:monospace;}
.dot{width:6px;height:6px;border-radius:50%;background:#29ABE2;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
h1{font-size:clamp(20px,4vw,30px);font-weight:800;margin-bottom:12px;}
p{color:rgba(255,255,255,0.6);font-size:15px;line-height:1.7;margin-bottom:32px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
a{display:inline-flex;align-items:center;padding:13px 26px;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;transition:all 0.2s;}
.primary{background:linear-gradient(135deg,#1A3FAA,#29ABE2);color:white;box-shadow:0 0 28px rgba(41,171,226,0.3);}
.primary:hover{transform:translateY(-2px);box-shadow:0 0 45px rgba(41,171,226,0.5);}
.ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);}
.ghost:hover{background:rgba(255,255,255,0.09);transform:translateY(-2px);}

</style>

<meta name="theme-color" content="#06091A">
<link rel="manifest" href="manifest.json">
<script defer src="analytics.js"></script>

<style id="kovax-loading-style">
#kovaxLoader{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#06091A;transition:opacity .45s ease,visibility .45s ease}
#kovaxLoader.hide{opacity:0;visibility:hidden}
.kovax-loader-box{text-align:center;color:white;font-family:Outfit,Arial,sans-serif}
.kovax-spinner{width:58px;height:58px;border-radius:50%;border:4px solid rgba(255,255,255,.12);border-top-color:#29ABE2;margin:0 auto 16px;animation:kovaxSpin .8s linear infinite}
.kovax-loader-box strong{letter-spacing:.08em}.kovax-loader-box span{display:block;margin-top:6px;color:rgba(255,255,255,.58);font-size:13px}
@keyframes kovaxSpin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="kovaxLoader"><div class="kovax-loader-box"><div class="kovax-spinner"></div><strong>KOVAX ACADEMY</strong><span>Chargement...</span></div></div>
<script>window.addEventListener('load',()=>setTimeout(()=>document.getElementById('kovaxLoader')?.classList.add('hide'),350));</script>

<div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="content">
  <div class="badge"><span class="dot"></span>ERÈ 404</div>
  <div class="num">404</div>
  <h1>Paj Sa a Pa Egziste</h1>
  <p>Paj ou ap chèche a pa jwenn oswa li deplase. Retounen nan akèy epi kòmanse depi la.</p>
  <div class="btns">
    <a href="index.html" class="primary">← Retounen Akèy</a>
    <a href="enskripsyon.html" class="ghost">Enskri Kounye a →</a>
  </div>
</div>


</body>
</html>
